
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow's Haven</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FFFFFF;
            color: #1A3A5F;
            margin: 0;
            padding: 0;
        }

        h1, h2, h3 {
            font-family: 'Cinzel', serif;
        }

        .header {
            background-color: #1A3A5F;
            color: #D5D8DC;
            padding: 20px;
            text-align: center;
        }

        .content {
            padding: 20px;
        }

        .nav a {
            color: #D5D8DC;
            text-decoration: none;
            margin: 0 15px;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        /* Sea Haven Theme */
        .sea-haven-theme {
            background-color: #F0FFF0; /* A light green for the body */
        }

        .sea-haven-theme .header {
            background-color: #48C9B0; /* Aurora Green */
            color: #FFFFFF;
        }
        
        .sea-haven-theme .nav a {
            color: #FFFFFF;
        }

        .sea-haven-theme h1, .sea-haven-theme h2, .sea-haven-theme h3 {
            color: #1A3A5F; /* Sanctuary Blue for headers */
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Glow's Haven</h1>
        <div class="nav">
            <a href="#" onclick="toggleTheme()">Switch to Sea Haven</a>
        </div>
    </div>

    <div class="content">
        <h2>Welcome to Glow's Haven</h2>
        <p>This is the legacy spoke for Sea Haven.</p>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('sea-haven-theme');
        }
    </script>

</body>
</html>

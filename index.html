
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow's Haven</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FFFFFF;
            color: #1A3A5F;
            margin: 0;
            padding: 0;
            transition: background-color 0.5s, color 0.5s;
        }

        h1, h2, h3 {
            font-family: 'Cinzel', serif;
        }

        .header {
            background-color: #1A3A5F;
            color: #D5D8DC;
            padding: 20px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content {
            padding: 20px;
        }

        .nav a {
            color: #D5D8DC;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .hero {
            background: url('https://placehold.co/1200x400/F0FFF0/1A3A5F?text=Sanctuary') no-repeat center center;
            background-size: cover;
            color: #1A3A5F;
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 4em;
            margin: 0;
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
            flex-wrap: wrap;
        }

        .gallery-item {
            width: 300px;
            height: 200px;
            background-color: #EAECEE;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1A3A5F;
            font-size: 1.2em;
        }

        /* Sea Haven Theme */
        .sea-haven-theme {
            background-color: #F0FFF0; /* A light green for the body */
        }

        .sea-haven-theme .header {
            background-color: #48C9B0; /* Aurora Green */
            color: #FFFFFF;
        }
        
        .sea-haven-theme .nav a {
            color: #FFFFFF;
        }

        .sea-haven-theme h1, .sea-haven-theme h2, .sea-haven-theme h3, .sea-haven-theme .hero {
            color: #1A3A5F; /* Sanctuary Blue for headers */
        }

        .sea-haven-theme .gallery-item {
            background-color: #D4EFDF;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Glow's Haven</h1>
        <div class="nav">
            <a href="#" onclick="toggleTheme()">Switch to Sea Haven</a>
        </div>
    </div>

    <div class="hero">
        <h1>Welcome to Glow's Haven</h1>
    </div>

    <div class="content">
        <div class="gallery">
            <div class="gallery-item">Duck Photo 1</div>
            <div class="gallery-item">Duck Photo 2</div>
            <div class="gallery-item">Duck Photo 3</div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('sea-haven-theme');
            const themeToggle = document.querySelector('.nav a');
            if (document.body.classList.contains('sea-haven-theme')) {
                themeToggle.textContent = 'Switch to Glow\'s Haven';
            } else {
                themeToggle.textContent = 'Switch to Sea Haven';
            }
        }
    </script>

</body>
</html>
